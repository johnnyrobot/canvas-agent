<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Lock the renderer down with a strict CSP: no remote origins, no inline
      script. This is a single-user, fully on-device app — the renderer only
      ever talks to the main process through the `canvasAgent` preload bridge.
      `frame-src 'self'` permits ONLY the sandboxed, script-disabled `srcdoc`
      preview frame (Canvas-fidelity fragment preview); it loads no remote URL.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canvas Course Design &amp; Accessibility Assistant</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        --line: rgba(127, 127, 127, 0.3);
        --line-strong: rgba(127, 127, 127, 0.45);
        --accent: #0374b5;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Header ── */
      header {
        padding: 0.6rem 1rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      header h1 { font-size: 0.95rem; margin: 0; white-space: nowrap; }
      .header__spacer { flex: 1; }
      .health { font-size: 0.8rem; }
      .health--ok { color: #1a7f37; }
      .health--degraded { color: #9a6700; }

      .mode-bar { display: inline-flex; gap: 0.25rem; }
      .mode, .toggle {
        font: inherit;
        font-size: 0.8rem;
        padding: 0.25rem 0.7rem;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      .mode--on { background: var(--accent); color: #fff; border-color: var(--accent); }
      .toggle--on { background: var(--accent); color: #fff; border-color: var(--accent); }

      /* ── Workspace ── */
      .workspace { flex: 1; display: flex; min-height: 0; }
      .sidebar {
        width: 220px;
        flex: 0 0 220px;
        border-right: 1px solid var(--line);
        overflow-y: auto;
      }
      .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .panel-host {
        width: 380px;
        flex: 0 0 380px;
        border-left: 1px solid var(--line);
        overflow-y: auto;
      }

      /* ── Sessions sidebar ── */
      .sessions { padding: 0.75rem; }
      .sessions__head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
      .sessions h2 { font-size: 0.85rem; margin: 0; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }
      .sessions__new {
        font: inherit; font-size: 0.78rem; padding: 0.25rem 0.5rem;
        border: 1px solid var(--line-strong); border-radius: 6px; background: transparent; color: inherit; cursor: pointer;
      }
      .sessions__list { list-style: none; margin: 0.75rem 0 0; padding: 0; display: flex; flex-direction: column; gap: 0.25rem; }
      .sessions__row { display: flex; align-items: stretch; gap: 0.25rem; border-radius: 6px; }
      .sessions__row--active { background: rgba(3, 116, 181, 0.14); }
      .sessions__open {
        flex: 1; text-align: left; font: inherit; font-size: 0.82rem; padding: 0.4rem 0.5rem;
        border: 0; background: transparent; color: inherit; cursor: pointer; border-radius: 6px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .sessions__del {
        border: 0; background: transparent; color: inherit; cursor: pointer; font-size: 1rem; opacity: 0.55; padding: 0 0.5rem;
      }
      .sessions__del:hover { opacity: 1; color: #cf222e; }
      .sessions__empty { font-size: 0.8rem; opacity: 0.6; margin: 0.75rem 0 0; }

      /* ── Transcript ── */
      #transcript {
        flex: 1; overflow-y: auto; padding: 1rem;
        display: flex; flex-direction: column; gap: 1rem;
      }
      .turn { max-width: 70ch; }
      .turn--user { align-self: flex-end; text-align: right; opacity: 0.85; }
      .turn--error { color: #cf222e; }
      .turn__mode {
        font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
        opacity: 0.7; margin: 0 0 0.25rem;
      }
      .turn__tool-live { font-size: 0.8rem; font-style: italic; opacity: 0.7; }
      .turn__tools { font-size: 0.75rem; opacity: 0.7; }
      .turn__fragments { display: flex; flex-direction: column; gap: 0.5rem; }

      /* ── Fragment cards ── */
      .fragment {
        border: 1px solid var(--line-strong); border-radius: 8px; padding: 0.75rem; margin-top: 0.5rem;
      }
      .badge {
        display: inline-block; font-size: 0.72rem; font-weight: 600;
        padding: 0.15rem 0.5rem; border-radius: 999px; margin-bottom: 0.5rem;
      }
      .badge--passed { background: #d2f8d2; color: #0a5d1f; }
      .badge--withheld { background: #ffe1c2; color: #8a4b00; }
      .fragment__blockers-label, .fragment__review-label {
        font-size: 0.78rem; font-weight: 600; margin: 0.5rem 0 0.2rem;
      }
      .fragment__blockers { color: #8a4b00; }
      .fragment__align {
        margin-top: 0.6rem; font: inherit; font-size: 0.78rem; padding: 0.3rem 0.7rem;
        border: 1px solid var(--line-strong); border-radius: 6px; background: transparent; color: inherit; cursor: pointer;
      }

      /* ── Artifacts strip (preview / copy / download / code) ── */
      .artifacts { margin-top: 0.6rem; }
      .artifacts__bar { display: flex; flex-wrap: wrap; gap: 0.35rem; }
      .artifacts__btn {
        font: inherit; font-size: 0.76rem; padding: 0.25rem 0.6rem;
        border: 1px solid var(--line-strong); border-radius: 6px; background: transparent; color: inherit; cursor: pointer;
      }
      .artifacts__btn--on { background: var(--accent); color: #fff; border-color: var(--accent); }
      .preview__frame {
        width: 100%; height: 320px; margin-top: 0.5rem;
        border: 1px solid var(--line-strong); border-radius: 6px; background: #fff;
      }
      .artifacts__code {
        margin-top: 0.5rem; padding: 0.6rem; border-radius: 6px; overflow: auto; max-height: 260px;
        background: rgba(127, 127, 127, 0.12); font-size: 0.78rem; white-space: pre-wrap; word-break: break-word;
      }

      /* ── Remediate before → after ── */
      .remediate__label { font-size: 0.78rem; font-weight: 600; margin: 0.6rem 0 0.2rem; }
      .remediate__before {
        margin: 0; padding: 0.6rem; border-radius: 6px; overflow: auto; max-height: 200px;
        background: rgba(127, 127, 127, 0.12); font-size: 0.78rem; white-space: pre-wrap; word-break: break-word;
      }
      .remediate__diffs { list-style: none; margin: 0.2rem 0 0; padding: 0; display: flex; flex-direction: column; gap: 0.2rem; }
      .remediate__diffs li { display: flex; gap: 0.5rem; align-items: baseline; font-size: 0.85rem; }
      .remediate__mark { font-weight: 700; }
      .remediate__mark--fixed { color: #1a7f37; }
      .remediate__mark--unfixed { color: #cf222e; }

      /* ── Remediate source input ── */
      .remediate-wrap { padding: 0 1rem 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
      .remediate-wrap label { font-size: 0.78rem; font-weight: 600; opacity: 0.8; }
      .remediate-source { font: inherit; font-size: 0.85rem; min-height: 5rem; resize: vertical; padding: 0.5rem; }

      /* ── Footer (prompt) ── */
      footer { padding: 0.75rem 1rem; border-top: 1px solid var(--line); display: flex; gap: 0.5rem; }
      #prompt { flex: 1; resize: vertical; min-height: 2.5rem; font: inherit; padding: 0.5rem; }
      #submit { padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
      #submit:disabled { opacity: 0.5; cursor: default; }

      /* ── Panels (brand kit / alignment) ── */
      .panel { padding: 0.9rem 1rem; }
      .panel h2 { font-size: 0.95rem; margin: 0 0 0.6rem; }
      .panel h3 { font-size: 0.8rem; margin: 0.9rem 0 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }

      .brand__inputs { display: flex; gap: 1rem; }
      .brand__inputs label { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.78rem; }
      .brand__inputs input[type="color"] { width: 3rem; height: 2rem; padding: 0; border: 1px solid var(--line-strong); border-radius: 6px; background: transparent; }
      .brand__swatches { display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .brand__swatch {
        flex: 1 1 7rem; min-width: 7rem; padding: 0.5rem 0.6rem; border-radius: 6px; border: 1px solid var(--line);
        display: flex; flex-direction: column; gap: 0.15rem; font-size: 0.74rem;
      }
      .brand__role { font-weight: 700; }
      .brand__ratio { opacity: 0.85; }
      .brand__warnings { list-style: disc; margin: 0.5rem 0 0; padding-left: 1.2rem; color: #9a6700; font-size: 0.8rem; }
      .brand__preview { margin-top: 0.25rem; }
      .brand__saverow { display: flex; gap: 0.4rem; margin-top: 0.9rem; }
      .brand__name { flex: 1; font: inherit; font-size: 0.85rem; padding: 0.35rem 0.5rem; }
      .brand__save {
        font: inherit; font-size: 0.82rem; padding: 0.35rem 0.8rem; cursor: pointer;
        border: 1px solid var(--accent); border-radius: 6px; background: var(--accent); color: #fff;
      }
      .brand__kits { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.25rem; }
      .brand__kit-row { display: flex; gap: 0.25rem; }
      .brand__kit {
        flex: 1; display: flex; align-items: center; gap: 0.5rem; text-align: left; font: inherit; font-size: 0.82rem;
        padding: 0.4rem 0.5rem; border: 1px solid var(--line); border-radius: 6px; background: transparent; color: inherit; cursor: pointer;
      }
      .brand__kit-dot { width: 1.5rem; height: 1rem; border-radius: 3px; border: 1px solid var(--line-strong); display: inline-block; }
      .brand__kit-del { border: 0; background: transparent; color: inherit; cursor: pointer; font-size: 1rem; opacity: 0.55; padding: 0 0.5rem; }
      .brand__kit-del:hover { opacity: 1; color: #cf222e; }
      .brand__kits-empty { font-size: 0.8rem; opacity: 0.6; margin: 0; }

      .align__label { display: block; font-size: 0.78rem; font-weight: 600; margin: 0.6rem 0 0.2rem; opacity: 0.8; }
      .align__field { width: 100%; font: inherit; font-size: 0.85rem; padding: 0.5rem; resize: vertical; }
      .align__row { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.75rem; }
      .align__check {
        font: inherit; font-size: 0.82rem; padding: 0.4rem 0.8rem; cursor: pointer;
        border: 1px solid var(--accent); border-radius: 6px; background: var(--accent); color: #fff;
      }
      .align__hint { font-size: 0.78rem; opacity: 0.7; margin: 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>Canvas Course Design &amp; Accessibility Assistant</h1>
      <div id="mode-bar" class="mode-bar" role="group" aria-label="Assistant mode"></div>
      <div class="header__spacer"></div>
      <button id="toggle-brand" class="toggle" type="button">Brand kit</button>
      <button id="toggle-align" class="toggle" type="button">Alignment</button>
      <span id="health" class="health">Local runtime: checking…</span>
    </header>

    <div class="workspace">
      <div id="sidebar" class="sidebar"></div>

      <div class="main-col">
        <main id="transcript" aria-live="polite"></main>

        <section id="remediate-wrap" class="remediate-wrap" hidden>
          <label for="remediate-source">Source HTML to remediate</label>
          <textarea
            id="remediate-source"
            class="remediate-source"
            placeholder="Paste the HTML you want repaired…"
            aria-label="Source HTML to remediate"
          ></textarea>
        </section>

        <footer>
          <textarea
            id="prompt"
            placeholder="Describe what you want to build (⌘/Ctrl+Enter to send)…"
            aria-label="Your request"
          ></textarea>
          <button id="submit" type="button">Send</button>
        </footer>
      </div>

      <div id="panel-host" class="panel-host" hidden></div>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
